{% extends 'base.html' %}
{% block title %}New Playlist — Spotifyclone{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create Playlist</h1>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Playlist Name</label>
        <input type="text" name="name" placeholder="My Playlist #1" class="form-input" required autofocus>
      </div>
      <button type="submit" class="btn btn-green btn-full">Create</button>
      <a href="{% url 'my_playlists' %}" class="btn btn-outline btn-full" style="margin-top:10px">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
